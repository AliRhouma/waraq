<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ورق — اللغة</title>
  <link rel="stylesheet" href="../../css/design-system.css">
  <link rel="stylesheet" href="../../css/components.css">
  <style>
    body { padding: 0; }

    .lang-card {
      background: var(--bg-card);
      border: 2px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      cursor: pointer;
      transition: all var(--transition-base);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .lang-card:hover {
      border-color: var(--color-gold-400);
      background: var(--bg-hover);
    }
    .lang-card.selected {
      border-color: var(--color-gold-500);
      background: rgba(196,146,42,0.06);
      box-shadow: 0 0 0 4px rgba(196,146,42,0.12), 0 0 0 6px var(--color-gold-500);
    }
    .lang-card-name {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: var(--space-2);
    }
    .lang-card-latin {
      font-family: var(--font-heading);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      direction: ltr;
    }
    .lang-card.selected .lang-card-name { color: var(--color-gold-700); }
    .lang-card.selected .lang-card-latin { color: var(--color-gold-500); }
    .lang-check {
      position: absolute;
      top: var(--space-3);
      left: var(--space-3);
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      color: transparent;
      transition: all var(--transition-base);
    }
    .lang-card.selected .lang-check {
      background: var(--color-gold-600);
      border-color: var(--color-gold-600);
      color: var(--color-gold-100);
    }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="screen">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <span>▌▌▌</span>
        <span style="font-size:9px;">WiFi</span>
        <span style="font-size:9px;">⬛</span>
      </div>
    </div>

    <!-- App Header -->
    <div class="app-header" style="justify-content: flex-start; gap: var(--space-4);">
      <a href="01-welcome.html" class="app-header-icon" style="text-decoration:none; font-size:var(--text-lg);">‹</a>
      <div>
        <div class="app-header-title" style="font-size: var(--text-xl);">ورق</div>
        <span class="app-header-title-latin">Language</span>
      </div>
    </div>

    <div class="scroll-area">
      <div style="padding: var(--space-6) var(--space-5); min-height: 600px; display: flex; flex-direction: column;">

        <!-- Progress dots -->
        <div style="display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: var(--space-8);">
          <div style="width:8px;height:4px;border-radius:2px;background:rgba(196,146,42,0.35);"></div>
          <div style="width:28px;height:4px;border-radius:2px;background:var(--color-gold-400);box-shadow:0 0 8px rgba(196,146,42,0.5);"></div>
          <div style="width:8px;height:4px;border-radius:2px;background:rgba(196,146,42,0.25);"></div>
          <div style="width:8px;height:4px;border-radius:2px;background:rgba(196,146,42,0.25);"></div>
          <div style="width:8px;height:4px;border-radius:2px;background:rgba(196,146,42,0.25);"></div>
        </div>

        <!-- Heading -->
        <div class="fade-up" style="text-align: center; margin-bottom: var(--space-8);">
          <h1 style="
            font-family: var(--font-arabic);
            font-size: var(--text-2xl);
            color: var(--text-primary);
            margin-bottom: var(--space-2);
          ">اختر لغتك</h1>
          <p style="
            font-family: var(--font-heading);
            font-size: var(--text-xs);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            direction: ltr;
          ">Choose your language</p>
        </div>

        <!-- Divider -->
        <div class="fade-up-1" style="margin-bottom: var(--space-6);">
          <div class="orn-divider">
            <div class="orn-divider-line"></div>
            <span class="orn-divider-star">✦</span>
            <div class="orn-divider-line"></div>
          </div>
        </div>

        <!-- Language cards -->
        <div class="fade-up-2" style="display: flex; flex-direction: column; gap: var(--space-4); flex: 1;">

          <div class="lang-card selected" id="card-ar" onclick="selectLang('ar')">
            <div class="lang-check">✓</div>
            <div class="lang-card-name">العربية</div>
            <div class="lang-card-latin">Arabic</div>
          </div>

          <div class="lang-card" id="card-en" onclick="selectLang('en')">
            <div class="lang-check">✓</div>
            <div class="lang-card-name" style="font-family: var(--font-heading); font-size: var(--text-2xl); direction: ltr;">English</div>
            <div class="lang-card-latin">الإنجليزية</div>
          </div>

        </div>

        <!-- Continue button -->
        <div class="fade-up-3" style="margin-top: var(--space-8);">
          <a href="03-location.html" class="btn btn-primary" style="
            display: block;
            text-align: center;
            text-decoration: none;
            direction: ltr;
          ">Continue</a>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  function selectLang(lang) {
    document.getElementById('card-ar').classList.remove('selected');
    document.getElementById('card-en').classList.remove('selected');
    document.getElementById('card-' + lang).classList.add('selected');
  }
</script>

<script src="../../js/router.js"></script>
</body>
</html>
