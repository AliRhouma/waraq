<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ورق — مرحباً</title>
  <link rel="stylesheet" href="../../css/design-system.css">
  <link rel="stylesheet" href="../../css/components.css">
  <style>
    body { padding: 0; }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="screen">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <span>▌▌▌</span>
        <span style="font-size:9px;">WiFi</span>
        <span style="font-size:9px;">⬛</span>
      </div>
    </div>

    <div class="scroll-area">
      <div style="
        min-height: 760px;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: linear-gradient(180deg, var(--color-gold-900) 0%, var(--color-gold-800) 35%, var(--bg-page) 100%);
        position: relative;
        overflow: hidden;
      ">

        <!-- Geo bg -->
        <div style="
          position: absolute; inset: 0;
          background-image: url('data:image/svg+xml,%3Csvg width=%2280%22 height=%2280%22 viewBox=%220 0 80 80%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cg fill=%22none%22 stroke=%22%23E8C96A%22 stroke-opacity=%220.06%22 stroke-width=%221%22%3E%3Crect x=%2210%22 y=%2210%22 width=%2260%22 height=%2260%22 transform=%22rotate(45 40 40)%22/%3E%3Ccircle cx=%2240%22 cy=%2240%22 r=%2228%22/%3E%3C/g%3E%3C/svg%3E');
          pointer-events: none;
        "></div>

        <!-- Progress dots -->
        <div style="
          display: flex; gap: 8px; align-items: center;
          padding: var(--space-6) var(--space-6) 0;
          width: 100%; justify-content: center;
          position: relative; z-index: 1;
        ">
          <div style="width:28px;height:4px;border-radius:2px;background:var(--color-gold-400);box-shadow:0 0 8px rgba(196,146,42,0.5);"></div>
          <div style="width:8px;height:4px;border-radius:2px;background:rgba(196,146,42,0.25);"></div>
          <div style="width:8px;height:4px;border-radius:2px;background:rgba(196,146,42,0.25);"></div>
          <div style="width:8px;height:4px;border-radius:2px;background:rgba(196,146,42,0.25);"></div>
          <div style="width:8px;height:4px;border-radius:2px;background:rgba(196,146,42,0.25);"></div>
        </div>

        <!-- Main content -->
        <div style="
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: var(--space-8) var(--space-8) var(--space-6);
          width: 100%;
          position: relative; z-index: 1;
        ">

          <!-- Bismillah ornament -->
          <div class="fade-up" style="text-align: center; margin-bottom: var(--space-8);">
            <div style="
              font-family: var(--font-display);
              font-size: 1.6rem;
              color: var(--color-gold-400);
              line-height: 1.4;
              margin-bottom: var(--space-3);
            ">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div class="orn-divider" style="padding: 0 var(--space-4);">
              <div class="orn-divider-line"></div>
              <span class="orn-divider-diamond"></span>
              <span class="orn-divider-star">✦</span>
              <span class="orn-divider-diamond"></span>
              <div class="orn-divider-line"></div>
            </div>
          </div>

          <!-- Arabic Logo -->
          <div class="fade-up-1" style="text-align: center; margin-bottom: var(--space-4);">
            <div style="
              font-family: var(--font-display);
              font-size: 6rem;
              color: var(--color-gold-200);
              line-height: 0.9;
              text-shadow: 0 0 40px rgba(196,146,42,0.4);
            ">ورق</div>
          </div>

          <!-- Latin subtitle -->
          <div class="fade-up-2" style="text-align: center; margin-bottom: var(--space-6); direction: ltr;">
            <div style="
              font-family: var(--font-heading);
              font-size: var(--text-xs);
              letter-spacing: 0.12em;
              text-transform: uppercase;
              color: var(--color-gold-400);
              line-height: var(--leading-relaxed);
              max-width: 240px;
              margin: 0 auto;
            ">Build your habits,<br>one tiny step at a time</div>
          </div>

          <!-- Hadith quote -->
          <div class="fade-up-3" style="
            background: rgba(42,28,4,0.6);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: var(--space-5) var(--space-6);
            text-align: center;
            margin-bottom: var(--space-8);
            position: relative;
          ">
            <div class="orn-corner-tl"></div>
            <div class="orn-corner-tr"></div>
            <div class="orn-corner-bl"></div>
            <div class="orn-corner-br"></div>
            <p style="
              font-family: var(--font-body);
              font-style: italic;
              font-size: var(--text-md);
              color: var(--color-ink-200);
              line-height: var(--leading-relaxed);
              direction: ltr;
            ">"The most beloved deeds to Allah are those done consistently, even if small."</p>
            <p style="
              font-family: var(--font-heading);
              font-size: 0.6rem;
              letter-spacing: 0.2em;
              text-transform: uppercase;
              color: var(--color-gold-500);
              margin-top: var(--space-3);
              direction: ltr;
            ">Sahih al-Bukhari &amp; Muslim</p>
          </div>

          <!-- Begin button -->
          <div class="fade-up-4" style="width: 100%;">
            <a href="02-language.html" class="btn btn-primary" style="
              display: block;
              text-align: center;
              text-decoration: none;
              font-family: var(--font-heading);
              font-size: var(--text-xs);
              letter-spacing: 0.3em;
            ">Begin</a>
          </div>

          <!-- Skip link (demo only) -->
          <div class="fade-up-4" style="margin-top: var(--space-4); text-align: center; direction: ltr;">
            <a href="../home/index.html" style="
              font-family: var(--font-heading);
              font-size: 0.48rem;
              letter-spacing: 0.22em;
              text-transform: uppercase;
              color: rgba(196,146,42,0.45);
              text-decoration: none;
              transition: color 0.2s;
            " onmouseover="this.style.color='rgba(196,146,42,0.75)'" onmouseout="this.style.color='rgba(196,146,42,0.45)'">
              Skip to Home →
            </a>
          </div>

        </div>

        <!-- Bottom ornament -->
        <div style="padding: 0 var(--space-8) var(--space-6); width: 100%; position: relative; z-index: 1;">
          <div class="orn-divider">
            <div class="orn-divider-line"></div>
            <span class="orn-divider-star">✦</span>
            <div class="orn-divider-line"></div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="../../js/router.js"></script>
</body>
</html>
